# Собирает Linux amd64/arm64 и прикрепляет к GitHub Release.
# Варианты: (1) git tag v1.0.0 && git push origin v1.0.0 — релиз и файлы создаются автоматически;
# (2) вручную Releases → Publish release — workflow тоже отработает.

name: Release agent binaries

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-agent-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  attach-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux amd64 & arm64
        env:
          VERSION: ${{ steps.tag.outputs.name }}
        run: |
          set -eux
          for goarch in amd64 arm64; do
            out="openvpn-control-agent-${VERSION}-linux-${goarch}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w -X openvpn-control-agent/internal.AgentVersion=${VERSION}" \
              -o "${out}" ./cmd/agent
          done
          sha256sum openvpn-control-agent-${VERSION}-linux-amd64 \
            openvpn-control-agent-${VERSION}-linux-arm64 > SHA256SUMS

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            openvpn-control-agent-${{ steps.tag.outputs.name }}-linux-amd64
            openvpn-control-agent-${{ steps.tag.outputs.name }}-linux-arm64
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
